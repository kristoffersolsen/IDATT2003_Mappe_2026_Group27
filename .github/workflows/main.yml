name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions needed for the deploy job to publish to Pages.
# `contents: read` is the default; `pages: write` and `id-token: write` are
# required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify:
    name: Build, test, and check style
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run Maven verify
        # Runs Checkstyle (validate phase), Surefire (tests), and JaCoCo report.
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Generate site reports
        # Generates the HTML reports defined in pom.xml's <reporting> block
        # (Checkstyle and JaCoCo) under target/site/.
        # `-DgenerateProjectInfo=false` skips the boilerplate "About" pages we
        # don't need. Runs on success or failure so a red build still gets a
        # report (it just won't be deployed).
        if: success() || failure()
        run: >
          mvn --batch-mode --no-transfer-progress
          site -DgenerateProjectInfo=false

      - name: Assemble Pages site
        # Combines both reports under a single directory with an index page.
        # Only runs on push to main; PR runs build but don't publish.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -e
          mkdir -p public/jacoco public/checkstyle

          # JaCoCo: pom.xml writes the report to target/site/jacoco/.
          cp -r target/site/jacoco/. public/jacoco/

          # Checkstyle: mvn site renders the report as target/site/checkstyle.html
          # plus shared CSS/image assets at target/site/css/ and target/site/images/.
          cp target/site/checkstyle.html public/checkstyle/index.html
          [ -d target/site/css ] && cp -r target/site/css public/checkstyle/
          [ -d target/site/images ] && cp -r target/site/images public/checkstyle/

          cat > public/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Build reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 640px;
                     margin: 4rem auto; padding: 0 1rem; }
              h1 { margin-bottom: 0.5rem; }
              p { color: #555; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.75rem 0; }
              a { color: #0366d6; text-decoration: none; font-weight: 500; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Build reports</h1>
            <p>Generated from the latest push to <code>main</code>.</p>
            <ul>
              <li><a href="jacoco/index.html">JaCoCo coverage report</a></li>
              <li><a href="checkstyle/index.html">Checkstyle report</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: List generated site contents
        # Diagnostic step — prints what mvn site actually produced. Cheap and
        # invaluable when something doesn't end up where we expect.
        if: always()
        run: |
          echo "=== target/site contents ==="
          ls -la target/site/ || echo "target/site does not exist"
          echo "=== target/site/jacoco contents ==="
          ls -la target/site/jacoco/ 2>/dev/null || echo "no jacoco directory"

      - name: Upload test results
        # Always run so reports are available even when tests fail.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload Pages artifact
        # Only on push to main; PRs run verify but don't publish.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy reports to Pages
    # Only deploy on push to main, and only after verify passes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
