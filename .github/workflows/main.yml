name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, and check style
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run Maven verify
        # Runs Checkstyle (validate phase), Surefire (tests), and JaCoCo report.
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Generate site reports
        # Generates the HTML reports defined in pom.xml's <reporting> block
        # (Checkstyle and JaCoCo) under target/site/. Runs on success or
        # failure so a red build still produces a downloadable report.
        if: success() || failure()
        run: mvn --batch-mode --no-transfer-progress site -DgenerateProjectInfo=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/site/checkstyle.html
          if-no-files-found: ignore
